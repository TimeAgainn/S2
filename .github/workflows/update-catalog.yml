name: Update CS2 catalog

# Régénère catalog.json (liste complète des skins/caisses/collections + images)
# depuis l'API communautaire ByMykel/CSGO-API. Une fois par semaine suffit :
# le catalogue ne change que lorsque Valve sort une nouvelle caisse/collection.
on:
  schedule:
    - cron: "0 5 * * 1"   # tous les lundis à 5h UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Régénérer catalog.json
        run: python3 scripts/build_catalog.py

      - name: Commit et push si le fichier a changé
        run: |
          git config user.name "cs2-price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add catalog.json
          git diff --cached --quiet || git commit -m "Mise à jour du catalogue ($(date -u +'%Y-%m-%d'))"
          git push
