name: Update CS2 prices

# Se déclenche automatiquement toutes les 6h, + à la main depuis l'onglet Actions,
# + à chaque push sur main (pratique pour tester juste après avoir modifié le script).
# Intervalle allongé (4h -> 6h) car le catalogue est passé à ~190 items : avec
# 3s de délai entre deux appels Steam, un run complet prend ~15-20 minutes.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/update_prices.py"

permissions:
  contents: write   # nécessaire pour que le workflow puisse commit prices.json

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Récupérer les prix et écrire prices.json
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/update_prices.py

      - name: Commit et push si le fichier a changé
        run: |
          git config user.name "cs2-price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add prices.json skinport_all.json
          git diff --cached --quiet || git commit -m "Mise à jour des prix ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git pull --rebase origin main
          git push
